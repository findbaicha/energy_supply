<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Hardware Check | Body</title>
    <style>
        :root { --main-color: #ff7b72; --bg: #0d1117; --panel: #161b22; }
        body { background: var(--bg); color: #c9d1d9; font-family: monospace; padding: 40px; }
        .nav { margin-bottom: 20px; color: #8b949e; }
        .nav a { color: var(--main-color); text-decoration: none; }
        .container { border: 1px solid var(--main-color); border-radius: 8px; padding: 30px; box-shadow: 0 0 20px rgba(255,123,114,0.1); }
        h1 { color: var(--main-color); border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .stat-item { background: var(--panel); padding: 15px; border-radius: 5px; border-left: 4px solid var(--main-color); }
        .progress-bar { height: 10px; background: #30363d; border-radius: 5px; margin-top: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--main-color); width: 65%; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="nav"><a href="index.html">root@Youth-OS</a> / body / hardware_check</div>
    <div class="container">
        <h1>[REPORT] 生理机能运行报告</h1>
        <div class="stat-grid">
            <div class="stat-item">
                <div>能源储备 (Sleep)</div>
                <div class="progress-bar"><div class="progress-fill" style="width: 45%;"></div></div>
            </div>
            <div class="stat-item">
                <div>水分供给 (Hydration)</div>
                <div class="progress-bar"><div class="progress-fill" style="width: 80%;"></div></div>
            </div>
        </div>
        <p style="margin-top: 20px;">> 指令：<b>sudo run exercise.sh --intensity medium</b></p>
        <p>> 建议：去操场慢跑，清理久坐产生的系统缓存。</p>
    </div>
</body>
</html>
