<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Deep SPA | Soul</title>
    <style>
        :root { --main-color: #7ee787; --bg: #0d1117; }
        body { background: var(--bg); color: #c9d1d9; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .back { position: absolute; top: 20px; left: 20px; }
        .back a { color: var(--main-color); text-decoration: none; }
        .circle { width: 200px; height: 200px; border: 2px solid var(--main-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; }
        .circle::after { content: ""; width: 100%; height: 100%; border: 2px solid var(--main-color); border-radius: 50%; position: absolute; animation: ripple 3s linear infinite; }
        @keyframes ripple { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
        p { margin-top: 30px; letter-spacing: 5px; color: var(--main-color); }
    </style>
</head>
<body>
    <div class="back"><a href="index.html">← 返回系统首页</a></div>
    <div class="circle">
        <span>静修中...</span>
    </div>
    <p>INhale ... EXhale</p>
</body>
</html>
