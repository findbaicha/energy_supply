<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Memory Buffer | Brain</title>
    <style>
        :root { --main-color: #79c0ff; --bg: #0d1117; }
        body { background: var(--bg); color: #c9d1d9; font-family: 'Consolas', monospace; padding: 40px; }
        .nav { margin-bottom: 20px; }
        .nav a { color: var(--main-color); text-decoration: none; }
        .code-window { background: #000; border: 1px solid #30363d; border-radius: 6px; padding: 20px; position: relative; }
        .code-window::before { content: "● ● ●"; position: absolute; top: 10px; left: 15px; color: #30363d; }
        .line { margin-bottom: 5px; border-left: 20px solid #161b22; padding-left: 15px; }
        .comment { color: #8b949e; }
        .keyword { color: var(--main-color); }
    </style>
</head>
<body>
    <div class="nav"><a href="index.html">root@Youth-OS</a> / brain / cognitive_upgrade</div>
    <div class="code-window">
        <div class="line"><span class="comment">// 正在加载非教学大纲知识库...</span></div>
        <div class="line"><span class="keyword">while</span> (isAlive) {</div>
        <div class="line">&nbsp;&nbsp;brain.update(<span class="keyword">new</span> Knowledge("Critical Thinking"));</div>
        <div class="line">&nbsp;&nbsp;brain.read(<span class="keyword">this</span>.weekend_book);</div>
        <div class="line">}</div>
        <div class="line" style="color: var(--main-color); margin-top: 20px;">[SUCCESS] 认知维度已拓宽。</div>
    </div>
    <div class="game-entrance" onclick="location.href='brain_game.html'">
            <div>
                <span style="color: var(--main-color); font-size: 1.1rem;">🎮 记忆训练小游戏</span>
                <p style="margin-top: 5px; opacity: 0.8; font-size: 0.9rem;">点击开始 · 测试你的记忆力</p>
            </div>
            <div class="game-icon">🏃‍♂️</div>
        </div>
</body>
</html>
